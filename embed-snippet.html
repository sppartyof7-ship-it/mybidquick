<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  MyBidQuick — Embed Code for Tenant Websites                ║
  ║  Drop this snippet anywhere on your site to add the         ║
  ║  instant quote widget. Works on WordPress, Wix,             ║
  ║  Squarespace, or any HTML page.                             ║
  ╚══════════════════════════════════════════════════════════════╝

  SETUP:
  1. Replace TENANT_SLUG below with your business slug
     (e.g., "cloute", "cornerstone", "sparkle-clean")
  2. Paste this entire block where you want the widget to appear
  3. The widget auto-sizes to fit your page layout

  EXAMPLES:
  - Cloute Cleaning:      cloute-cleaning.mybidquick.com#quote
  - Cornerstone:          cornerstone.mybidquick.com#quote
  - Custom domain:        TENANT_SLUG.mybidquick.com#quote
-->

<!-- ═══ OPTION 1: Full-Page Embed (recommended for dedicated "Get a Quote" page) ═══ -->
<div id="mybidquick-widget" style="width:100%; max-width:1200px; margin:0 auto;">
  <iframe
    src="https://cloute-cleaning.mybidquick.com#quote"
    style="width:100%; height:100vh; min-height:800px; border:none; border-radius:12px;"
    title="Get an Instant Quote"
    allow="geolocation"
    loading="lazy"
  ></iframe>
</div>


<!-- ═══ OPTION 2: Floating Button + Popup (for any page — non-intrusive) ═══ -->
<!--
  Adds a "Get Instant Quote" button in the bottom-right corner.
  When clicked, it opens the quoting engine in a slide-up modal.
  Great for homepages, service pages, and blog posts.
-->
<div id="mbq-float-btn"
  onclick="document.getElementById('mbq-modal').style.display='flex'"
  style="
    position:fixed; bottom:24px; right:24px; z-index:9999;
    background:linear-gradient(135deg,#3b9cff,#6dd19e);
    color:#fff; padding:14px 28px; border-radius:50px;
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:16px; font-weight:700; cursor:pointer;
    box-shadow:0 4px 20px rgba(59,156,255,0.4);
    transition:transform 0.2s, box-shadow 0.2s;
  "
  onmouseover="this.style.transform='scale(1.05)';this.style.boxShadow='0 6px 28px rgba(59,156,255,0.5)'"
  onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 20px rgba(59,156,255,0.4)'"
>
  ⚡ Get Instant Quote
</div>

<div id="mbq-modal" style="
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  z-index:10000; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  align-items:flex-end; justify-content:center;
  font-family:'Segoe UI',system-ui,sans-serif;
">
  <div style="
    width:100%; max-width:600px; height:90vh;
    background:#fff; border-radius:20px 20px 0 0;
    overflow:hidden; position:relative;
    box-shadow:0 -4px 40px rgba(0,0,0,0.2);
    animation:mbq-slide-up 0.3s ease-out;
  ">
    <!-- Close button -->
    <div onclick="document.getElementById('mbq-modal').style.display='none'"
      style="
        position:absolute; top:12px; right:16px; z-index:10;
        width:36px; height:36px; border-radius:50%;
        background:rgba(0,0,0,0.06); display:flex;
        align-items:center; justify-content:center;
        cursor:pointer; font-size:18px; color:#666;
      "
    >&times;</div>

    <iframe
      src="https://cloute-cleaning.mybidquick.com#quote"
      style="width:100%; height:100%; border:none;"
      title="Get an Instant Quote"
      allow="geolocation"
      loading="lazy"
    ></iframe>
  </div>
</div>

<style>
  @keyframes mbq-slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
</style>
